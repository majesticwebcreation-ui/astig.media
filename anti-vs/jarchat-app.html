<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry - Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-dark: #0f172a;
    --primary: #8b5cf6;
    --secondary: #ec4899;
    --accent: #06b6d4;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --font-family: 'Outfit', sans-serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
}

/* reused background animations */
.background-globes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.globe {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: floatGlobe 20s infinite alternate ease-in-out;
}

.globe-1 {
    width: 500px;
    height: 500px;
    background: var(--primary);
    top: -10%;
    left: -10%;
}

.globe-2 {
    width: 400px;
    height: 400px;
    background: var(--secondary);
    bottom: -10%;
    right: -5%;
    animation-delay: -5s;
}

.globe-3 {
    width: 300px;
    height: 300px;
    background: var(--accent);
    top: 40%;
    left: 40%;
    opacity: 0.4;
    animation-delay: -10s;
}

@keyframes floatGlobe {
    0% {
        transform: translate(0, 0) scale(1);
    }

    100% {
        transform: translate(30px, 50px) scale(1.1);
    }
}

.main-container {
    display: flex;
    width: 490px;
    max-width: 490px;
    height: 700px;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    padding: 0;
}

/* Character Section (Deprecated/Removed from HTML flow, styles repurposed) */
.character-section {
    display: none;
}

/* Chat Layout Wrapper */
.chat-layout {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 0;
    flex: 1;
    overflow: hidden;
    min-height: 0;
}

.character-container {
    width: 60px;
    /* Small icon size */
    height: 60px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    /* Subtle glowing backdrop */
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.character-img {
    height: 100%;
    width: 100%;
    object-fit: cover;
    border-radius: 50%;
    /* Circle avatar */
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
    transform-origin: center;
}

.floating-anim {
    animation: none;
    /* Disable float for avatar style */
}

/* Conversation Flow */
.conversation-flow {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 15px;
    overflow-y: auto;
    padding-right: 5px;
}

/* Message Wrapper */
.message-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 15px;
    width: 100%;
}

.avatar {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 3D Bubble Style for Current Step */
.current-step {
    background: none;
    border: none;
    padding: 0;
    margin-top: 0;
    padding-left: 0;
    flex: 1;
    max-height: 50vh;
    /* Limit height for long responses */
    overflow-y: auto;
    /* Enable vertical scroll */
    padding-right: 10px;
    /* Space for scrollbar */
    scrollbar-width: thin;
    /* Firefox */
    scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
}

/* Custom Scrollbar for response bubbles */
.current-step::-webkit-scrollbar {
    width: 6px;
}

.current-step::-webkit-scrollbar-track {
    background: transparent;
}

.current-step::-webkit-scrollbar-thumb {
    background-color: rgba(255, 255, 255, 0.3);
    border-radius: 10px;
}

/* Typing Effect in Bubble */
.current-step h2 {
    font-size: 1.2rem;
    /* Smaller text for bubble */
    font-weight: 400;
    line-height: 1.5;
    background: none;
    -webkit-text-fill-color: var(--text-main);
    color: var(--text-main);
    animation: none;
    /* remove slide up */
}

@keyframes lookAround {

    0%,
    100% {
        transform: rotateY(0deg) scale(1);
        /* Front Smile */
    }

    20% {
        transform: rotateY(0deg) scale(1.03);
        /* Subtle bounce/smile emphasis */
    }

    35% {
        transform: rotateY(-12deg) scale(1);
        /* Look Left */
    }

    50% {
        transform: rotateY(0deg) scale(1);
        /* Center */
    }

    65% {
        transform: rotateY(12deg) scale(1);
        /* Look Right */
    }

    80% {
        transform: rotateY(0deg) scale(1.03);
        /* Front Smile Emphasis */
    }
}

/* Form Interface */
.form-interface {
    flex: 1;
    width: 490px;
    max-width: 490px;
    height: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    padding: 16px 16px 12px;
    position: relative;
    z-index: 20;
    overflow: hidden;
    box-sizing: border-box;
}

.form-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.status-dot {
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 8px #10b981;
}

.form-header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}

.settings-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    /* For anchor tags */
}

.settings-btn:hover {
    color: var(--text-main);
}

/* Conversation Flow */
.conversation-flow {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 14px;
    overflow-y: auto;
    margin-bottom: 12px;
    padding: 4px 2px 12px 0;
    scroll-behavior: smooth;
    min-height: 0;
}

/* History Items */
.history-item {
    opacity: 0.5;
    transition: opacity 0.5s;
    border-left: 2px solid var(--primary);
    padding-left: 15px;
    margin-bottom: 10px;
}

.history-q {
    display: block;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    max-height: 200px;
    /* Limit history height */
    overflow-y: auto;
    padding-right: 5px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
}

.history-a {
    display: block;
    font-size: 1rem;
    color: var(--text-main);
}

/* Current Question */
.current-step h2 {
    font-size: 1.5rem;
    font-weight: 300;
    line-height: 1.3;
    background: linear-gradient(to right, #fff, #a5b4fc);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* Typewriter Effect */
.typewriter {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    margin: 0;
    width: 0;
    animation: typing 2s steps(11, end) forwards;
    /* 11 chars in "I'm Cherry." */
    -webkit-text-fill-color: var(--text-main);
    /* Override gradient for typing text if needed, or keep gradient */
}

@keyframes typing {
    from {
        width: 0
    }

    to {
        width: 11ch
    }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Input Area */
.input-area {
    margin-top: auto;
    padding-bottom: 6px;
    flex-shrink: 0;
}

.input-wrapper {
    display: flex;
    align-items: center;
    border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 8px;
    transition: border-color 0.3s;
}

.nav-actions {
    display: flex;
    justify-content: center;
    /* Align buttons to the center */
    gap: 15px;
    /* Space between buttons */
    margin-top: 15px;
    /* Space from the input line */
    position: relative;
    z-index: 30;
}

.input-wrapper:focus-within {
    border-bottom-color: var(--primary);
}

#user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 1.2rem;
    color: white;
    font-family: inherit;
    font-weight: 300;
}

#user-input::placeholder {
    color: rgba(255, 255, 255, 0.2);
}

.nav-btn,
#send-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--text-main);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.nav-btn:hover,
#send-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.nav-btn.hidden {
    display: none;
    /* Properly hide it */
}

#back-btn:hover {
    transform: translateX(-5px);
}



/* Mobile */
@media (max-width: 768px) {
    body {
        align-items: flex-start;
        /* Allow scrolling/layout from top */
        overflow-y: auto;
        /* Allow scrolling on mobile if content overflows */
        height: auto;
        min-height: 100dvh;
    }

    .main-container {
        flex-direction: column;
        width: 100%;
        min-height: 100dvh;
        /* Use min-height */
        height: auto;
        max-height: none;
        gap: 0;
        padding: 0;
    }

    .character-section {
        display: flex !important;
        /* Force show */
        height: 35vh;
        min-height: 200px;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 0;
        z-index: 1;
        /* Bring it up slightly */
        position: relative;
        pointer-events: none;
        /* Prevent blocking clicks */
    }

    .character-container {
        width: 100%;
        max-width: 300px;
        /* Allow slightly wider */
        height: 100%;
        /* Fill the section height */
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    .character-img {
        width: auto;
        height: 100%;
        /* Ensure it fits vertically without cropping */
        max-width: 100%;
        object-fit: contain;
        transform-origin: bottom center;
    }

    .form-interface {
        width: 100%;
        max-width: none;
        flex: 1;
        /* Take remaining height */
        height: auto;
        border-radius: 30px 30px 0 0;
        /* Sheet styling */
        border: 1px solid var(--glass-border);
        border-bottom: none;
        padding: 20px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        z-index: 10;
        /* Sit on top of character */
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        /* Slightly darker/more opaque on mobile */
    }

    .current-step h2 {
        font-size: 1.5rem;
        /* Readable prompt size */
    }

    #user-input {
        font-size: 1.2rem;
        /* Prevent auto-zoom on iOS (needs >= 16px, this is safe) */
    }

    .form-header {
        margin-top: 10px;
    }

    .input-wrapper {
        gap: 10px;
    }

    /* Ensure buttons are touch-friendly */
    .nav-btn,
    #send-btn,
    .settings-btn {
        padding: 10px;
    }
}

/* Brand Footer */
.brand-footer {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 4px;
    margin-bottom: 0;
    padding-top: 4px;
    border-top: none;
    flex-shrink: 0;
}

.brand-link {
    font-size: 0.75rem;
    /* Small text */
    color: var(--text-muted);
    text-decoration: none;
    opacity: 0.5;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
}

.brand-link:hover {
    opacity: 1;
    color: var(--text-main);
    letter-spacing: 2px;
    /* Subtle expansion hover effect */
}

/* Webhook Toggle */
.webhook-toggle-container {
    display: flex;
    align-items: center;
    gap: 8px;
    /* Slightly tighter gap for header */
    margin-bottom: 0;
    /* Remove bottom margin */
    margin-left: 0;
    margin-right: 0;
}

.toggle-label {
    display: none;
    /* Hide label on mobile if needed, but keeping for now */
    font-size: 0.7rem;
    /* Smaller for header */
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
}

/* Show label on larger screens or always? Keeping it. */
@media (max-width: 400px) {
    .toggle-label {
        display: none;
    }
}

.switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    transition: .4s;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.slider:before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 2px;
    bottom: 2px;
    background-color: var(--text-muted);
    transition: .4s;
    border-radius: 50%;
}

input:checked+.slider {
    background-color: rgba(139, 92, 246, 0.3);
    /* Primary color low opacity */
    border-color: var(--primary);
}

input:checked+.slider:before {
    transform: translateX(16px);
    background-color: var(--text-main);
}

/* Rounded sliders */
.slider.round {
    border-radius: 34px;
}

/* Loading Dots Animation */
.loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 24px;
}

.dot {
    width: 8px;
    height: 8px;
    background-color: var(--text-main);
    border-radius: 50%;
    opacity: 0.6;
    animation: bounce 1.4s infinite ease-in-out both;
}

.dot:nth-child(1) {
    animation-delay: -0.32s;
}

.dot:nth-child(2) {
    animation-delay: -0.16s;
}

@keyframes bounce {

    0%,
    80%,
    100% {
        transform: scale(0);
    }

    40% {
        transform: scale(1.0);
    }
}

</style>
</head>

            window.parent.postMessage({
                type: 'ASTIG_JARCHAT_TELEMETRY',
                payload: {
                    kind: String(kind || '').trim(),
                    sessionId: formData.sessionId,
                    webhookMode: currentWebhookMode,
                    webhookUrl: currentWebhookUrl,
                    ...payload
                }
            }, '*');
        } catch (error) {
            void error;
        }
    }

    function setCurrentWebhookMode(mode) {
        const nextMode = mode === 'test' || mode === 'chat' || mode === 'production' ? mode : 'production';
        currentWebhookMode = nextMode;
        currentWebhookUrl = webhookUrls[nextMode] || webhookUrls.chat || webhookUrls.production || webhookUrls.test || '';
        if (webhookToggle) {
            webhookToggle.checked = nextMode === 'test';
        }
        if (toggleLabel) {
            toggleLabel.textContent = nextMode === 'chat' ? 'Chat Mode' : 'Test Mode';
        }
    }

    function applyRuntimeConfig(nextConfig) {
        runtimeConfig = nextConfig && typeof nextConfig === 'object' ? nextConfig : null;
        const webhook = runtimeConfig && runtimeConfig.webhook && typeof runtimeConfig.webhook === 'object'
            ? runtimeConfig.webhook
            : {};
        const converse = runtimeConfig && runtimeConfig.converse && typeof runtimeConfig.converse === 'object'
            ? runtimeConfig.converse
            : {};
        const header = runtimeConfig && runtimeConfig.header && typeof runtimeConfig.header === 'object'
            ? runtimeConfig.header
            : {};
        const theme = runtimeConfig && runtimeConfig.theme && typeof runtimeConfig.theme === 'object'
            ? runtimeConfig.theme
            : {};
        const footer = runtimeConfig && runtimeConfig.footer && typeof runtimeConfig.footer === 'object'
            ? runtimeConfig.footer
            : {};

        webhookUrls = {
            production: String(webhook.url || webhook.productionUrl || webhookUrls.production || '').trim(),
            test: String(webhook.testUrl || webhookUrls.test || '').trim(),
            chat: String(webhook.chatUrl || webhook.url || webhookUrls.chat || '').trim()
        };
        setCurrentWebhookMode(String(webhook.activeMode || currentWebhookMode || 'production').trim());

        if (headerTitle && header.title) {
            headerTitle.textContent = String(header.title).trim() || headerTitle.textContent;
        }
        if (statusDot && theme.primaryColor) {
            statusDot.style.background = theme.primaryColor;
            statusDot.style.boxShadow = `0 0 10px ${theme.primaryColor}`;
        }
        if (formInterface) {
            const conversationFill = String(converse.conversationFill || 'theme').trim();
            const conversationBg = String(converse.conversationBgColor || theme.bgColor || '').trim();
            const conversationGradientEnd = String(converse.conversationGradientEnd || theme.surfaceColor || '').trim();
            if (conversationFill === 'gradient' && conversationBg && conversationGradientEnd) {
                formInterface.style.background = `linear-gradient(180deg, ${conversationBg}, ${conversationGradientEnd})`;
            } else if (conversationFill === 'solid' && conversationBg) {
                formInterface.style.background = conversationBg;

            }
            if (theme.borderRadius) {
                formInterface.style.borderRadius = `${Number(theme.borderRadius) || 20}px`;
            }
        }
        if (inputWrapper) {
            const composer = converse.composer && typeof converse.composer === 'object' ? converse.composer : {};
            const composerFill = String(composer.fill || 'theme').trim();
            const composerBg = String(composer.bgColor || theme.surfaceColor || '').trim();
            const composerGradientEnd = String(composer.gradientEnd || theme.bgColor || '').trim();
            inputWrapper.style.background = 'transparent';
            if (composerFill === 'gradient' && composerBg && composerGradientEnd) {
                inputWrapper.style.background = `linear-gradient(135deg, ${composerBg}, ${composerGradientEnd})`;
                inputWrapper.style.padding = '12px 14px';
                inputWrapper.style.borderRadius = '18px';
                inputWrapper.style.borderBottom = 'none';
            } else if (composerFill === 'solid' && composerBg) {
                inputWrapper.style.background = composerBg;
                inputWrapper.style.padding = '12px 14px';
                inputWrapper.style.borderRadius = '18px';
                inputWrapper.style.borderBottom = 'none';
            } else {
                inputWrapper.style.padding = '';
                inputWrapper.style.borderRadius = '';
                inputWrapper.style.borderBottom = '';
            }
            if (composer.fontFamily) userInput.style.fontFamily = composer.fontFamily;
            if (composer.fontSizePx) userInput.style.fontSize = `${Number(composer.fontSizePx) || 14}px`;
        }
        if (sendBtn) {
            const sendButton = converse.sendButton && typeof converse.sendButton === 'object' ? converse.sendButton : {};
            const sendFill = String(sendButton.fill || 'theme').trim();
            const sendBg = String(sendButton.bgColor || theme.primaryColor || '').trim();
            const sendGradientEnd = String(sendButton.gradientEnd || theme.gradient?.end || '').trim();
            if (sendFill === 'gradient' && sendBg && sendGradientEnd) {
                sendBtn.style.background = `linear-gradient(135deg, ${sendBg}, ${sendGradientEnd})`;
            } else if (sendFill === 'solid' && sendBg) {
                sendBtn.style.background = sendBg;
            } else {
                sendBtn.style.background = '';
            }
            if (sendButton.sizePx) {
                const nextHeight = Math.max(44, Number(sendButton.sizePx) || 50);
                sendBtn.style.minHeight = `${nextHeight}px`;
                sendBtn.style.paddingLeft = '18px';
                sendBtn.style.paddingRight = '18px';
            }
            if (sendButton.shape === 'square') sendBtn.style.borderRadius = '14px';
            else if (sendButton.shape === 'rounded') sendBtn.style.borderRadius = '18px';
            else sendBtn.style.borderRadius = '999px';
            if (sendButton.iconUrl) {

            } else {

        if (footer.text && brandLink) {
            brandLink.textContent = String(footer.text).trim() || brandLink.textContent;

        if (footer.url && brandLink) {

    function downloadChat() {
        let transcript = "Chat Transcript - Cherry\n\n";

        // Get all history items (including hidden ones)
        const historyItems = flowContainer.querySelectorAll('.history-item');
        historyItems.forEach(item => {
            const q = item.querySelector('.history-q');
            const a = item.querySelector('.history-a');

            if (q) transcript += `Cherry: ${q.innerText.replace(/\n/g, ' ')}\n`;
            if (a) transcript += `You: ${a.innerText.replace(/\n/g, ' ')}\n`;
            transcript += "\n";
        });

        // Get current step if it has content (e.g. the last response)
        const current = flowContainer.querySelector('.current-step h2');
        if (current && current.innerText) {
            transcript += `Cherry: ${current.innerText.replace(/\n/g, ' ')}\n`;
        }

        const blob = new Blob([transcript], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `chat-transcript-${new Date().toISOString().slice(0, 10)}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }

    function renderStep() {
        // Clear previous 'current-step' classes but keep history
        archiveCurrentStep();

        if (currentStep < steps.length) {
            // Render Next Question
            const stepData = steps[currentStep];
            let qText = stepData.question;

            // Replace placeholders
            if (formData.name) {
                qText = qText.replace('{name}', formData.name);
            }

            // Create Message Block with Avatar
            const stepDiv = createBotMessage();
            stepDiv.innerHTML = `<h2></h2>`;

            // Trigger typing
            const h2 = stepDiv.querySelector('h2');
            typeText(h2, qText);

            userInput.placeholder = stepData.placeholder;
            userInput.value = '';
            userInput.focus();
            userInput.disabled = false;
        } else {
            // Submission Step
            submitForm();
        }

        scrollToBottom();
    }

    function typeText(element, html, speed = 40) {
        if (runtimeConfig && runtimeConfig.converse && runtimeConfig.converse.typingEnabled === false) {
            element.innerHTML = html;
            return;
        }
        element.innerHTML = html; // Set initial structure (hidden text)

        const textNodes = [];
        // Walk the tree to find all text nodes
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walker.nextNode()) {
            textNodes.push({ node: node, text: node.nodeValue });
            node.nodeValue = ''; // Clear text content initially
        }

        let nodeIdx = 0;
        let charIdx = 0;

        function type() {
            if (nodeIdx >= textNodes.length) return;

            const currentItem = textNodes[nodeIdx];

            if (charIdx < currentItem.text.length) {
                currentItem.node.nodeValue += currentItem.text.charAt(charIdx);
                charIdx++;
                setTimeout(type, speed);
                scrollToBottom();
            } else {
                nodeIdx++;
                charIdx = 0;
                type(); // Proceed to next text node immediately
            }
        }

        // Start typing if there is text
        if (textNodes.length > 0) {
            type();
        }
    }

    function addToHistory(answer) {
        // Find the active question wrapper content
        // The last child of flowContainer is now .message-wrapper
        const lastWrapper = flowContainer.lastElementChild;
        if (lastWrapper) {
            const activeStep = lastWrapper.querySelector('.current-step') || lastWrapper.querySelector('.history-item');
            // It might be activeStep or historyItem depending on timing, usually it's current-step when user types
            if (activeStep) {
                const answerSpan = document.createElement('span');
                answerSpan.className = 'history-a';
                answerSpan.textContent = answer;
                activeStep.appendChild(answerSpan);
            }
        }
    }

    function requestEmail() {
        if (isAskingForEmail) return; // Already asking
        isAskingForEmail = true;

        // Render Bot Question
        const stepDiv = createBotMessage();
        stepDiv.innerHTML = `<h2></h2>`;

        const h2 = stepDiv.querySelector('h2');
        typeText(h2, "To stay in touch, could you please share your email address?");

        userInput.placeholder = "Enter your email...";
        userInput.value = '';
        userInput.focus();
        scrollToBottom();
    }

    async function handleNext() {
        const text = userInput.value.trim();
        if (!text) return;

        // Show Answer visually
        addToHistory(text);

        if (isAskingForEmail) {
            // Handle Email Input
            formData.email = text;
            isAskingForEmail = false;

            // Archive and send logic similar to continuous chat
            archiveCurrentStep();

            // Store original inquiry if needed, or just append details
            // Temporarily piggyback on inquiry to ensure it sends useful context if webhook isn't updated to look for email field explicitly
            // But we also have formData.email set

            // We can send a specific 'inquiry' saying user provided email
            formData.inquiry = `[User provided email: ${text}]`;

            userInput.value = '';
            scrollToBottom();
            submitForm();
            return;
        }

        if (currentStep < steps.length) {
            // Save Data for wizard steps
            const currentField = steps[currentStep].field;
            formData[currentField] = text;

            currentStep++;
            userInput.value = '';
            renderStep();
        } else {
            // Continuous Chat Mode
            archiveCurrentStep();
            formData.inquiry = text; // Send new text as inquiry
            userInput.value = '';
            scrollToBottom(); // Scroll after user message archives
            submitForm();
        }
    }

    function archiveCurrentStep() {
        // Find the wrapper with current-step
        // We can search the whole container or just look at last child
        const currentWrapper = flowContainer.querySelector('.message-wrapper:has(.current-step)') || flowContainer.lastElementChild;
        // :has support is good but fallback to lastElementChild is safer if structure holds

        if (currentWrapper) {
            const previousCurrent = currentWrapper.querySelector('.current-step');
            if (previousCurrent) {
                previousCurrent.classList.remove('current-step');
                previousCurrent.classList.add('history-item');
                // Change H2 to span for history styling
                const h2 = previousCurrent.querySelector('h2');
                if (h2) {
                    const spanQ = document.createElement('span');
                    spanQ.className = 'history-q';
                    spanQ.innerHTML = h2.innerHTML; // Keep HTML for highlights
                    previousCurrent.replaceChild(spanQ, h2);
                }
            }
        }
        pruneHistory();
    }

    function pruneHistory() {
        // Prune the wrappers, not just items inside
        const wrappers = flowContainer.querySelectorAll('.message-wrapper');
        // Keep only the last 2 wrappers visible
        if (wrappers.length > 2) {
            for (let i = 0; i < wrappers.length - 2; i++) {
                wrappers[i].style.display = 'none';
            }
        }
    }

    async function submitForm() {
        // Show Loading
        const stepDiv = createBotMessage();
        const loadingHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        stepDiv.innerHTML = loadingHTML;

        scrollToBottom(); // Scroll to show loading
        userInput.disabled = true;
        userInput.placeholder = "Please wait...";
        postTelemetry('submit-start', { text: formData.inquiry || formData.name || '' });


        try {
            console.log("Submitting to:", currentWebhookUrl); // Debug log
            const response = await fetch(currentWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const responseText = await response.text();
            try {
                data = responseText ? JSON.parse(responseText) : {};
            } catch (e) {
                console.warn("Could not parse JSON response, using text:", e);
                data = { text: responseText };
            }

            console.log("Webhook Response:", data); // Debug log
            postTelemetry('submit-success', {
                status: response.status || 200,
                rawResponse: responseText
            });

            // Success Message
            // Check for common n8n response fields: output, text, message, or nested data
            let botReply = "Thank you for reaching out.";

            if (data) {
                if (data.output) botReply = data.output;
                else if (data.text) botReply = data.text;
                else if (data.message) botReply = data.message;
                else if (Array.isArray(data) && data.length > 0) {
                    // Sometimes n8n returns an array of items
                    const firstItem = data[0];
                    if (firstItem.output) botReply = firstItem.output;
                    else if (firstItem.text) botReply = firstItem.text;
                    else if (firstItem.message) botReply = firstItem.message;
                } else if (typeof data === 'string') {
                    botReply = data;
                }
            }

            stepDiv.innerHTML = `<h2>${botReply}</h2>`;
            scrollToBottom(); // Scroll to show bot response


        } catch (error) {
            console.error(error);
            postTelemetry('submit-error', { message: error.message || 'Unknown webhook error' });
            stepDiv.innerHTML = `<h2>Error: ${error.message}</h2>`;
        } finally {
            userInput.disabled = false;
            userInput.placeholder = "Type here...";
            userInput.focus();
        }
    }





    function scrollToBottom() {
        // Use timeout to ensure DOM has updated
        setTimeout(() => {
            flowContainer.scrollTop = flowContainer.scrollHeight;
        }, 400);
    }

    function restart() {
        currentStep = 0;
        formData.sessionId = generateSessionId();
        formData.name = '';
        formData.inquiry = '';
        flowContainer.innerHTML = '';
        postTelemetry('restart');
        renderStep();
    }

    function generateSessionId() {
        return 'sess-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Event Listeners
    sendBtn.addEventListener('click', handleNext);
    restartBtn.addEventListener('click', restart);

    // Toggle Event Listener
    if (webhookToggle) {
        webhookToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                setCurrentWebhookMode('test');
                console.log("Switched to Test Webhook");
            } else {
                setCurrentWebhookMode('production');
                console.log("Switched to Prod Webhook");
            }
        });
    }

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // Prevent any default form action
            handleNext();
        }
    });

});

</script>
