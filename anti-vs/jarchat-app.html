<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry - Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-dark: #0f172a;
    --primary: #8b5cf6;
    --secondary: #ec4899;
    --accent: #06b6d4;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --font-family: 'Outfit', sans-serif;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

*::-webkit-scrollbar {
    width: 0 !important;
    height: 0 !important;
    display: none !important;
}

html {
    scrollbar-width: none;
    -ms-overflow-style: none;
    width: 100%;
    height: 100%;
    overflow: hidden !important;
    overscroll-behavior: none;
}

html::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-dark);
    color: var(--text-main);
    overflow: hidden !important;
    height: 100vh;
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    overscroll-behavior: none;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

body::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

iframe {
    scrollbar-width: none;
    -ms-overflow-style: none;
}

iframe::-webkit-scrollbar {
    width: 0 !important;
    height: 0 !important;
    display: none !important;
}

/* reused background animations */
.background-globes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.globe {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    animation: floatGlobe 20s infinite alternate ease-in-out;
}

.globe-1 {
    width: 500px;
    height: 500px;
    background: var(--primary);
    top: -10%;
    left: -10%;
}

.globe-2 {
    width: 400px;
    height: 400px;
    background: var(--secondary);
    bottom: -10%;
    right: -5%;
    animation-delay: -5s;
}

.globe-3 {
    width: 300px;
    height: 300px;
    background: var(--accent);
    top: 40%;
    left: 40%;
    opacity: 0.4;
    animation-delay: -10s;
}

@keyframes floatGlobe {
    0% {
        transform: translate(0, 0) scale(1);
    }

    100% {
        transform: translate(30px, 50px) scale(1.1);
    }
}

.main-container {
    position: fixed;
    inset: 0;
    display: flex;
    width: 100%;
    max-width: none;
    height: 100%;
    max-height: none;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    overflow: hidden;
    box-sizing: border-box;
}

/* Character Section (Deprecated/Removed from HTML flow, styles repurposed) */
.character-section {
    display: none;
}

/* Chat Layout Wrapper */
.chat-layout {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 0;
    padding-top: 0;
    flex: 1;
    height: auto;
    overflow: hidden;
    min-height: 0;
    max-height: none;
}

.chat-scroll-region {
    flex: 1;
    min-width: 0;
    min-height: 0;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.chat-scroll-region::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

.character-container {
    width: 60px;
    /* Small icon size */
    height: 60px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    /* Subtle glowing backdrop */
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.character-img {
    height: 100%;
    width: 100%;
    object-fit: cover;
    border-radius: 50%;
    /* Circle avatar */
    filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.3));
    transform-origin: center;
}

.floating-anim {
    animation: none;
    /* Disable float for avatar style */
}

/* Conversation Flow */
.conversation-flow {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 15px;
    overflow: visible;
    padding-right: 0;
    min-height: 100%;
    min-width: 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.conversation-flow::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

/* Message Wrapper */
.message-wrapper {
    display: flex;
    align-items: flex-start;
    gap: 15px;
    width: 100%;
    min-width: 0;
    overflow: visible;
}

.avatar {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 3D Bubble Style for Current Step */
.current-step {
    background: none;
    border: none;
    padding: 0;
    margin-top: 0;
    padding-left: 0;
    flex: 1 1 auto;
    max-height: none;
    overflow: visible;
    padding-right: 0;
    min-width: 0;
    width: 100%;
    max-width: 100%;
}

/* Custom Scrollbar for response bubbles */
.current-step::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

/* Typing Effect in Bubble */
.current-step h2 {
    font-size: 1.2rem;
    /* Smaller text for bubble */
    font-weight: 400;
    line-height: 1.5;
    background: none;
    -webkit-text-fill-color: var(--text-main);
    color: var(--text-main);
    animation: none;
    /* remove slide up */
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    max-width: 100%;
}

@keyframes lookAround {

    0%,
    100% {
        transform: rotateY(0deg) scale(1);
        /* Front Smile */
    }

    20% {
        transform: rotateY(0deg) scale(1.03);
        /* Subtle bounce/smile emphasis */
    }

    35% {
        transform: rotateY(-12deg) scale(1);
        /* Look Left */
    }

    50% {
        transform: rotateY(0deg) scale(1);
        /* Center */
    }

    65% {
        transform: rotateY(12deg) scale(1);
        /* Look Right */
    }

    80% {
        transform: rotateY(0deg) scale(1.03);
        /* Front Smile Emphasis */
    }
}

/* Form Interface */
.form-interface {
    flex: 1;
    width: 100%;
    max-width: none;
    height: 100%;
    max-height: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-top: none;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    padding: 16px 16px 12px;
    position: relative;
    z-index: 20;
    overflow: hidden;
    box-sizing: border-box;
    isolation: isolate;
}

.form-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    position: relative;
    z-index: 4;
    background: inherit;
    padding-bottom: 6px;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-logo {
    width: 28px;
    height: 28px;
    display: none;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.14);
    color: var(--text-main);
    font-size: 0.75rem;
    font-weight: 700;
    line-height: 1;
    text-transform: uppercase;
    flex-shrink: 0;
}

.brand-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.status-dot {
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 8px #10b981;
}

.form-header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}

.settings-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    /* For anchor tags */
}

.settings-btn:hover {
    color: var(--text-main);
}

.assistant-reply {
    display: block;
    width: 100%;
    min-width: 0;
    color: var(--text-main);
    font-size: 1.05rem;
    line-height: 1.55;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
    max-width: 100%;
}

.assistant-reply * {
    max-width: 100%;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
}

.assistant-reply h3 {
    margin: 0 0 0.45rem;
    font-size: 1.02rem;
    font-weight: 700;
    line-height: 1.35;
}

.assistant-reply p {
    margin: 0 0 0.7rem;
}

.assistant-reply p:last-child,
.assistant-reply ul:last-child,
.assistant-reply ol:last-child,
.assistant-reply h3:last-child {
    margin-bottom: 0;
}

.assistant-reply ul,
.assistant-reply ol {
    margin: 0 0 0.8rem;
    padding-left: 1.2rem;
}

.assistant-reply li + li {
    margin-top: 0.32rem;
}

.assistant-reply strong {
    font-weight: 700;
    color: #ffffff;
}

/* Conversation Flow */
.conversation-flow {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 14px;
    overflow: visible;
    margin-bottom: 0;
    padding: 4px 0 16px 0;
    scroll-behavior: smooth;
    min-height: 100%;
    min-width: 0;
    overscroll-behavior: contain;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.conversation-flow::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

/* History Items */
.history-item {
    flex: 1 1 auto;
    opacity: 0.5;
    transition: opacity 0.5s;
    border-left: 2px solid var(--primary);
    padding-left: 15px;
    margin-bottom: 10px;
    min-width: 0;
}

.history-q {
    display: block;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 4px;
    width: 100%;
    max-height: 200px;
    /* Limit history height */
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
}

.history-q::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
}

.history-a {
    display: block;
    font-size: 1rem;
    color: var(--text-main);
    width: 100%;
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
}

/* Current Question */
.current-step h2 {
    font-size: 1.5rem;
    font-weight: 300;
    line-height: 1.3;
    background: linear-gradient(to right, #fff, #a5b4fc);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* Typewriter Effect */
.typewriter {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    margin: 0;
    width: 0;
    animation: typing 2s steps(11, end) forwards;
    /* 11 chars in "I'm Cherry." */
    -webkit-text-fill-color: var(--text-main);
    /* Override gradient for typing text if needed, or keep gradient */
}

@keyframes typing {
    from {
        width: 0
    }

    to {
        width: 11ch
    }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Input Area */
.input-area {
    margin-top: 0;
    padding-bottom: 6px;
    flex-shrink: 0;
    position: relative;
    z-index: 4;
    background: inherit;
    padding-top: 8px;
}

.brand-footer {
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    padding-top: 4px;
    position: relative;
    z-index: 4;
    background: inherit;
}

.input-wrapper {
    display: flex;
    align-items: center;
    border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 8px;
    transition: border-color 0.3s;
}

.nav-actions {
    display: flex;
    justify-content: center;
    /* Align buttons to the center */
    gap: 15px;
    /* Space between buttons */
    margin-top: 15px;
    /* Space from the input line */
    position: relative;
    z-index: 30;
}

.input-wrapper:focus-within {
    border-bottom-color: var(--primary);
}

#user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-size: 1.2rem;
    color: white;
    font-family: inherit;
    font-weight: 300;
}

#user-input::placeholder {
    color: rgba(255, 255, 255, 0.2);
}

.nav-btn,
#send-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: var(--text-main);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 20px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.nav-btn:hover,
#send-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: var(--primary);
    color: white;
    transform: translateY(-2px);
}

.nav-btn.hidden {
    display: none;
    /* Properly hide it */
}

#back-btn:hover {
    transform: translateX(-5px);
}



/* Mobile */
@media (max-width: 768px) {
    body {
        align-items: flex-start;
        /* Allow scrolling/layout from top */
        overflow-y: auto;
        /* Allow scrolling on mobile if content overflows */
        height: auto;
        min-height: 100dvh;
    }

    .main-container {
        flex-direction: column;
        width: 100%;
        min-height: 100dvh;
        /* Use min-height */
        height: auto;
        max-height: none;
        gap: 0;
        padding: 0;
    }

    .character-section {
        display: flex !important;
        /* Force show */
        height: 35vh;
        min-height: 200px;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 0;
        z-index: 1;
        /* Bring it up slightly */
        position: relative;
        pointer-events: none;
        /* Prevent blocking clicks */
    }

    .character-container {
        width: 100%;
        max-width: 300px;
        /* Allow slightly wider */
        height: 100%;
        /* Fill the section height */
        display: flex;
        justify-content: center;
        align-items: flex-end;
    }

    .character-img {
        width: auto;
        height: 100%;
        /* Ensure it fits vertically without cropping */
        max-width: 100%;
        object-fit: contain;
        transform-origin: bottom center;
    }

    .form-interface {
        width: 100%;
        max-width: none;
        flex: 1;
        /* Take remaining height */
        height: auto;
        border-radius: 30px 30px 0 0;
        /* Sheet styling */
        border: 1px solid var(--glass-border);
        border-bottom: none;
        padding: 20px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        z-index: 10;
        /* Sit on top of character */
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        /* Slightly darker/more opaque on mobile */
    }

    .current-step h2 {
        font-size: 1.5rem;
        /* Readable prompt size */
    }

    #user-input {
        font-size: 1.2rem;
        /* Prevent auto-zoom on iOS (needs >= 16px, this is safe) */
    }

    .form-header {
        margin-top: 10px;
    }

    .input-wrapper {
        gap: 10px;
    }

    /* Ensure buttons are touch-friendly */
    .nav-btn,
    #send-btn,
    .settings-btn {
        padding: 10px;
    }
}

/* Brand Footer */
.brand-footer {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 4px;
    margin-bottom: 0;
    padding-top: 4px;
    border-top: none;
    flex-shrink: 0;
}

.brand-link {
    font-size: 0.75rem;
    /* Small text */
    color: var(--text-muted);
    text-decoration: none;
    opacity: 0.5;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
}

.brand-link:hover {
    opacity: 1;
    color: var(--text-main);
    letter-spacing: 2px;
    /* Subtle expansion hover effect */
}

/* Webhook Toggle */
.webhook-toggle-container {
    display: flex;
    align-items: center;
    gap: 8px;
    /* Slightly tighter gap for header */
    margin-bottom: 0;
    /* Remove bottom margin */
    margin-left: 0;
    margin-right: 0;
}

.toggle-label {
    display: none;
    /* Hide label on mobile if needed, but keeping for now */
    font-size: 0.7rem;
    /* Smaller for header */
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
}

/* Show label on larger screens or always? Keeping it. */
@media (max-width: 400px) {
.toggle-label {
    display: none;
}

.message-wrapper > * {
    min-width: 0;
}

.current-step,
.history-item,
.assistant-reply,
.assistant-reply p,
.assistant-reply li,
.history-q,
.history-a,
.current-step h2 {
    max-width: 100%;
    min-width: 0;
    white-space: normal !important;
    overflow-wrap: anywhere !important;
    word-break: break-word !important;
}
}

.switch {
    position: relative;
    display: inline-block;
    width: 36px;
    height: 20px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    transition: .4s;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.slider:before {
    position: absolute;
    content: "";
    height: 14px;
    width: 14px;
    left: 2px;
    bottom: 2px;
    background-color: var(--text-muted);
    transition: .4s;
    border-radius: 50%;
}

input:checked+.slider {
    background-color: rgba(139, 92, 246, 0.3);
    /* Primary color low opacity */
    border-color: var(--primary);
}

input:checked+.slider:before {
    transform: translateX(16px);
    background-color: var(--text-main);
}

/* Rounded sliders */
.slider.round {
    border-radius: 34px;
}

/* Loading Dots Animation */
.loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 24px;
}

.dot {
    width: 8px;
    height: 8px;
    background-color: var(--text-main);
    border-radius: 50%;
    opacity: 0.6;
    animation: bounce 1.4s infinite ease-in-out both;
}

.dot:nth-child(1) {
    animation-delay: -0.32s;
}

.dot:nth-child(2) {
    animation-delay: -0.16s;
}

@keyframes bounce {

    0%,
    80%,
    100% {
        transform: scale(0);
    }

    40% {
        transform: scale(1.0);
    }
}

</style>
</head>

<body>

    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <main class="main-container">
        <!-- Conversational Form Interface -->
        <section class="form-interface glass-panel">
            <!-- Character container moved inside chat-layout below -->
            <header class="form-header">
                <div class="brand">
                    <div class="brand-logo" aria-hidden="true"></div>
                    <div class="status-dot"></div>
                    <h1>Cherry</h1>
                </div>
                <div class="header-actions">
                    <div class="webhook-toggle-container">
                        <label class="switch">
                            <input type="checkbox" id="webhook-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label">Test Mode</span>
                    </div>
                    <a href="https://deejayedson.com/" class="settings-btn" aria-label="Home">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </a>
                    <button class="settings-btn" id="email-btn" aria-label="Send Email">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            // Render Next Question
            const stepData = steps[currentStep];
            let qText = stepData.question;

            // Replace placeholders
            if (formData.name) {
                qText = qText.replace(/\{name\}/gi, stripHtml(formData.name));
            }

            // Create Message Block with Avatar
            const stepDiv = createBotMessage();
            stepDiv.innerHTML = `<h2></h2>`;

            // Trigger prompt rendering
            const h2 = stepDiv.querySelector('h2');
            if (stepData.displayMode === 'typewriter') {
                typeText(h2, qText);
            } else {
                h2.innerHTML = qText;
            }

            userInput.placeholder = stepData.placeholder;
            userInput.value = '';
            userInput.focus();
            userInput.disabled = false;
        } else {
            // Submission Step
            submitForm();
        }

        scrollToBottom();
    }

    function typeText(element, html, speed = 40) {
        if (runtimeConfig && runtimeConfig.converse && runtimeConfig.converse.typingEnabled === false) {
            element.innerHTML = html;
            return;
        }
        element.innerHTML = html; // Set initial structure (hidden text)

        const textNodes = [];
        // Walk the tree to find all text nodes
        const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while (node = walker.nextNode()) {
            textNodes.push({ node: node, text: node.nodeValue });
            node.nodeValue = ''; // Clear text content initially
        }

        let nodeIdx = 0;
        let charIdx = 0;

        function type() {
            if (nodeIdx >= textNodes.length) return;

            const currentItem = textNodes[nodeIdx];

            if (charIdx < currentItem.text.length) {
                currentItem.node.nodeValue += currentItem.text.charAt(charIdx);
                charIdx++;
                setTimeout(type, speed);
                scrollToBottom();
            } else {
                nodeIdx++;
                charIdx = 0;
                type(); // Proceed to next text node immediately
            }
        }

        // Start typing if there is text
        if (textNodes.length > 0) {
            type();
        }
    }

    function addToHistory(answer) {
        // Find the active question wrapper content
        // The last child of flowContainer is now .message-wrapper
        const lastWrapper = flowContainer.lastElementChild;
        if (lastWrapper) {
            const activeStep = lastWrapper.querySelector('.current-step') || lastWrapper.querySelector('.history-item');
            // It might be activeStep or historyItem depending on timing, usually it's current-step when user types
            if (activeStep) {
                const answerSpan = document.createElement('span');
                answerSpan.className = 'history-a';
                answerSpan.textContent = answer;
                activeStep.appendChild(answerSpan);
            }
        }
    }

    function requestEmail() {
        if (isAskingForEmail) return; // Already asking
        isAskingForEmail = true;

        // Render Bot Question
        const stepDiv = createBotMessage();
        stepDiv.innerHTML = `<h2></h2>`;

        const h2 = stepDiv.querySelector('h2');
        typeText(h2, "To stay in touch, could you please share your email address?");

        userInput.placeholder = "Enter your email...";
        userInput.value = '';
        userInput.focus();
        scrollToBottom();
    }

    async function handleNext() {
        const text = userInput.value.trim();
        if (!text) return;

        // Show Answer visually
        addToHistory(text);

        if (isAskingForEmail) {
            // Handle Email Input
            formData.email = text;
            isAskingForEmail = false;

            // Archive and send logic similar to continuous chat
            archiveCurrentStep();

            // Store original inquiry if needed, or just append details
            // Temporarily piggyback on inquiry to ensure it sends useful context if webhook isn't updated to look for email field explicitly
            // But we also have formData.email set

            // We can send a specific 'inquiry' saying user provided email
            formData.inquiry = `[User provided email: ${text}]`;

            userInput.value = '';
            scrollToBottom();
            submitForm();
            return;
        }

        if (currentStep < steps.length) {
            // Save Data for wizard steps
            const currentField = steps[currentStep].field;
            formData[currentField] = text;

            currentStep++;
            userInput.value = '';
            renderStep();
        } else {
            // Continuous Chat Mode
            archiveCurrentStep();
            formData.inquiry = text; // Send new text as inquiry
            userInput.value = '';
            scrollToBottom(); // Scroll after user message archives
            submitForm();
        }
    }

    function archiveCurrentStep() {
        // Find the wrapper with current-step
        // We can search the whole container or just look at last child
        const currentWrapper = flowContainer.querySelector('.message-wrapper:has(.current-step)') || flowContainer.lastElementChild;
        // :has support is good but fallback to lastElementChild is safer if structure holds

        if (currentWrapper) {
            const previousCurrent = currentWrapper.querySelector('.current-step');
            if (previousCurrent) {
                previousCurrent.classList.remove('current-step');
                previousCurrent.classList.add('history-item');
                // Change H2 to span for history styling
                const h2 = previousCurrent.querySelector('h2');
                if (h2) {
                    const spanQ = document.createElement('span');
                    spanQ.className = 'history-q';
                    spanQ.innerHTML = h2.innerHTML; // Keep HTML for highlights
                    previousCurrent.replaceChild(spanQ, h2);
                }
            }
        }
        pruneHistory();
    }

    function pruneHistory() {
        // Prune the wrappers, not just items inside
        const wrappers = flowContainer.querySelectorAll('.message-wrapper');
        // Keep only the last 2 wrappers visible
        if (wrappers.length > 2) {
            for (let i = 0; i < wrappers.length - 2; i++) {
                wrappers[i].style.display = 'none';
            }
        }
    }

    function buildWebhookPayload() {
        const inquiryText = String(formData.inquiry || '').trim();
        const nameText = String(formData.name || '').trim();
        const primaryText = inquiryText || nameText;
        return {
            ...formData,
            message: primaryText,
            chatInput: primaryText,
            sessionId: formData.sessionId,
            formattingRules: "You must always present responses with a clear structure and readable layout.\n\nUse bold headings for main sections and insert one line break before each heading.\n\nSeparate each paragraph or section with one line break to maintain proper spacing in chat.\n\nUse bullet points for lists, numbered points for step-by-step instructions, and short paragraphs for context.\n\nOnly include headers when the response covers multiple sections.\n\nDo not include summaries at the end of long responses unless they help the user better understand the main ideas."
        };
    }

    function extractReplyFromPayload(payload, options = {}) {
        const preserveWhitespace = !!options.preserveWhitespace;
        if (payload === null || payload === undefined) return '';
        if (typeof payload === 'string') return preserveWhitespace ? payload : payload.trim();
        if (typeof payload === 'number' || typeof payload === 'boolean') return String(payload);

        if (Array.isArray(payload)) {
            for (const item of payload) {
                const candidate = extractReplyFromPayload(item, options);
                if (candidate) return candidate;
            }
            return '';
        }

        if (typeof payload === 'object') {
            const eventType = typeof payload.type === 'string' ? payload.type.trim().toLowerCase() : '';
            const ignoredEventTypes = new Set([
                'begin', 'start', 'started', 'metadata', 'heartbeat', 'ping', 'status',
                'end', 'done', 'complete', 'completed'
            ]);
            if (eventType && ignoredEventTypes.has(eventType)) {
                return '';
            }

            const directKeys = [
                'reply', 'message', 'text', 'output', 'response', 'answer', 'content',
                'final', 'finalText', 'finalOutput', 'chatOutput', 'completion'
            ];
            for (const key of directKeys) {
                if (typeof payload[key] === 'string') {
                    if (preserveWhitespace && payload[key].length > 0) return payload[key];
                    if (!preserveWhitespace && payload[key].trim()) return payload[key].trim();
                }
            }

            const nestedKeys = [
                'data', 'result', 'body', 'payload', 'output', 'outputs', 'item', 'items',
                'message', 'messages', 'response', 'responses', 'delta', 'chunk', 'content'
            ];
            for (const key of nestedKeys) {
                if (payload[key] !== undefined) {
                    const nested = extractReplyFromPayload(payload[key], options);
                    if (nested) return nested;
                }
            }
        }

        return '';
    }

    function parseReplyText(rawText, contentType = '') {
        const fallback = 'Thank you for reaching out.';
        const raw = String(rawText || '');
        const text = raw.trim();
        if (!text) return fallback;

        const contentTypeLower = String(contentType || '').toLowerCase();
        const looksJson = contentTypeLower.includes('application/json') || text.startsWith('{') || text.startsWith('[');

        if (!looksJson) return text;

        try {
            const parsed = JSON.parse(text);
            return extractReplyFromPayload(parsed) || fallback;
        } catch (error) {
            void error;
        }

        const normalized = raw
            .replace(/}\s*{/g, '}\n{')
            .replace(/\]\s*\[/g, ']\n[');

        const lines = normalized.split(/\r?\n/).map(line => line.trim()).filter(Boolean);
        const extractedParts = [];
        for (const line of lines) {
            let candidateLine = line;
            if (/^data:/i.test(candidateLine)) {
                candidateLine = candidateLine.replace(/^data:\s*/i, '');
            }
            if (!candidateLine || candidateLine === '[DONE]') continue;
            try {
                const parsedLine = JSON.parse(candidateLine);
                const fromLine = extractReplyFromPayload(parsedLine, { preserveWhitespace: true });
                if (fromLine !== '') extractedParts.push(fromLine);
            } catch (error) {
                void error;
            }
        }

        if (extractedParts.length > 0) {
            if (extractedParts.length > 1 && extractedParts.every(part => part.length <= 120)) {
                const merged = extractedParts.join('');
                return merged.trim() || fallback;
            }
            const last = extractedParts[extractedParts.length - 1];
            return String(last || '').trim() || fallback;
        }

        return text;
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function formatAssistantReply(text) {
        const normalized = String(text || '')
            .replace(/\r/g, '')
            .replace(/\\n/g, '\n')
            .trim();
        if (!normalized) return '<p>Thank you for reaching out.</p>';

        const escaped = escapeHtml(normalized);
        const blocks = escaped.split(/\n{2,}/).map(block => block.trim()).filter(Boolean);
        const htmlBlocks = [];

        for (const block of blocks) {
            const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
            if (!lines.length) continue;

            const isBulletList = lines.every(line => /^[-*]\s+/.test(line));
            const isNumberList = lines.every(line => /^\d+\.\s+/.test(line));

            if (isBulletList) {
                const items = lines
                    .map(line => line.replace(/^[-*]\s+/, ''))
                    .map(line => `<li>${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li>`)
                    .join('');
                htmlBlocks.push(`<ul>${items}</ul>`);
                continue;
            }

            if (isNumberList) {
                const items = lines
                    .map(line => line.replace(/^\d+\.\s+/, ''))
                    .map(line => `<li>${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</li>`)
                    .join('');
                htmlBlocks.push(`<ol>${items}</ol>`);
                continue;
            }

            if (lines.length === 1 && /^([A-Z][A-Za-z0-9\s/&,-]{1,60}|.*:)$/.test(lines[0])) {
                htmlBlocks.push(`<h3>${lines[0].replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}</h3>`);
                continue;
            }

            const paragraph = lines.join('<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            htmlBlocks.push(`<p>${paragraph}</p>`);
        }

        return htmlBlocks.join('');
    }

    async function submitForm() {
        // Show Loading
        const stepDiv = createBotMessage();
        const loadingHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        stepDiv.innerHTML = loadingHTML;

        scrollToBottom(); // Scroll to show loading
        userInput.disabled = true;
        userInput.placeholder = "Please wait...";

        try {
            const authContext = resolveWebhookAuthContext();
            const activeSelection = getActiveWebhookSelection();
            currentWebhookMode = String(activeSelection.mode || currentWebhookMode || 'production').trim();
            currentWebhookUrl = String(activeSelection.url || currentWebhookUrl || '').trim();
            const requestPayload = buildWebhookPayload();
            const headers = { 'Content-Type': 'application/json' };
            if (authContext && authContext.headerName && authContext.headerValue) {
                headers[String(authContext.headerName)] = String(authContext.headerValue);
            }
            postTelemetry('submit-start', {
                text: formData.inquiry || formData.name || '',
                webhookMode: currentWebhookMode,
                webhookUrl: currentWebhookUrl,
                authEnabled: !!(authContext && authContext.headerName && authContext.headerValue),
                authHeaderName: authContext && authContext.headerName ? String(authContext.headerName) : '',
                usingProxy: currentWebhookMode === 'proxy'
            });
            console.log("Submitting to:", currentWebhookUrl); // Debug log
            const response = await fetch(currentWebhookUrl, {
                method: 'POST',
                headers,
                body: JSON.stringify(requestPayload)
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const responseText = await response.text();
            let data = {};
            try {
                data = responseText ? JSON.parse(responseText) : {};
            } catch (e) {
                console.warn("Could not parse JSON response directly, using raw parser:", e);
                data = { text: responseText };
            }

            console.log("Webhook Response:", data); // Debug log
            postTelemetry('submit-success', {
                status: response.status || 200,
                rawResponse: responseText
            });

            const botReply = parseReplyText(
                responseText,
                response.headers && typeof response.headers.get === 'function' ? response.headers.get('content-type') || '' : ''
            );

            stepDiv.innerHTML = `<div class="assistant-reply">${formatAssistantReply(botReply)}</div>`;
            scrollToBottom(); // Scroll to show bot response


        } catch (error) {
            console.error(error);
            postTelemetry('submit-error', {
                message: error.message || 'Unknown webhook error',
                webhookMode: currentWebhookMode,
                webhookUrl: currentWebhookUrl
            });
            stepDiv.innerHTML = `<h2>Error: ${error.message}</h2>`;
        } finally {
            userInput.disabled = false;
            userInput.placeholder = "Type here...";
            userInput.focus();
        }
    }





    function scrollToBottom() {
        // Use timeout to ensure DOM has updated
        setTimeout(() => {
            const scrollHost = scrollRegion || flowContainer;
            scrollHost.scrollTop = scrollHost.scrollHeight;
        }, 400);
    }

    function restart() {
        currentStep = 0;
        formData.sessionId = generateSessionId();
        formData.name = '';
        formData.inquiry = '';
        flowContainer.innerHTML = '';
        postTelemetry('restart');
        renderStep();
    }

    function generateSessionId() {
        return 'sess-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    }

    // Event Listeners
    sendBtn.addEventListener('click', handleNext);
    restartBtn.addEventListener('click', restart);

    // Toggle Event Listener
    if (webhookToggle) {
        webhookToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                setCurrentWebhookMode('test');
                console.log("Switched to Test Webhook");
            } else {
                setCurrentWebhookMode('production');
                console.log("Switched to Prod Webhook");
            }
        });
    }

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // Prevent any default form action
            handleNext();
        }
    });

});

</script>
